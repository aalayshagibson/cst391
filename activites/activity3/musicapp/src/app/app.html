<div style="text-align:center; margin-top: 20px;">

</div>

    <ul class="navbar-nav me-auto mb-2 mb-lg-0" style="gap: 40px;">

        <a class="nav-link" [routerLink]="['/']" style="text-decoration: underline; font-size: 18px;">

        </a>

      <li class="nav-item">
