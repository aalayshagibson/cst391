<div class="row">
  <div class="col-12 col-md-4">
    <h4>Artists</h4>

    <div class="list-group">
      <button
        type="button"
        class="list-group-item list-group-item-action"
        *ngFor="let a of artists"
        (click)="onSelectArtist(a)">
        {{ a.artist }}
      </button>
    </div>
  </div>

  <div class="col-12 col-md-8">
    <div *ngIf="selectedArtist === null" class="alert alert-info">
      Select an artist to view albums.
    </div>

    <app-list-albums *ngIf="selectedArtist" [artist]="selectedArtist"></app-list-albums>
  </div>
</div>
