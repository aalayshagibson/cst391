<br/>

<h5>Welcome {{name}}, please place your Order</h5>

<form (ngSubmit)="onSubmit()" #infoForm="ngForm">

  <div class="form-group">
    <label for="quantity">Quantity</label>
    <input
      type="text"
      class="form-control"
      id="quantity"
      required
      [(ngModel)]="quantity"
      name="quantity">
  </div>

  <div class="form-group mt-2">
    <label for="products">Iphone</label>
    <select
      class="form-control"
      id="products"
      required
      [(ngModel)]="selectedProduct"
      name="products">

      <option *ngFor="let product of products"
              [value]="product">
        {{product}}
      </option>

    </select>
  </div>

  <button type="submit" class="btn btn-success mt-3">Buy</button>

  <button
    type="button"
    class="btn btn-secondary mt-3 ms-2"
    (click)="newInfo()">
    Reset
  </button>

</form>
